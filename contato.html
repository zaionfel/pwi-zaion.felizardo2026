            <!--observações-->

            <textarea id="mensagem" placeholder="Exemplo: Nome João, Quantidade de pessoas:4, Mesa Próxima a Janela."></textarea>

            <!--botão-->
            <button type="submit">Agendar Reserva</button>

        </form>
